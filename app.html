<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="液气进出管理">
    <meta name="theme-color" content="#1890ff">
    <title>液气进出管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1890ff;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1890ff 0%, #0050b3 100%);
            color: white;
            z-index: 9999;
        }
        .loading h1 {
            font-size: 24px;
            margin-bottom: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .loading p {
            font-size: 16px;
            opacity: 0.9;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px 0;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        .error {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            color: #333;
            padding: 20px;
            text-align: center;
            z-index: 10000;
        }
        .error h2 {
            color: #f5222d;
            margin-bottom: 20px;
        }
        .error p {
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .error button {
            margin-top: 20px;
            padding: 12px 30px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <h1>液气进出管理</h1>
        <div class="spinner"></div>
        <p>正在加载应用...</p>
    </div>
    
    <div class="error" id="error">
        <h2>加载失败</h2>
        <p>无法连接到服务器</p>
        <p>请检查网络连接后重试</p>
        <button onclick="location.reload()">重新加载</button>
    </div>
    
    <iframe id="appFrame" src="https://chipper-biscochitos-7278dc.netlify.app"></iframe>
    
    <script>
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const iframe = document.getElementById('appFrame');
        
        let loaded = false;
        
        // 加载成功
        iframe.onload = function() {
            loaded = true;
            loading.style.display = 'none';
            iframe.style.display = 'block';
        };
        
        // 加载失败
        iframe.onerror = function() {
            loading.style.display = 'none';
            error.style.display = 'flex';
        };
        
        // 超时处理
        setTimeout(function() {
            if (!loaded) {
                loading.style.display = 'none';
                error.style.display = 'flex';
            }
        }, 15000);
    </script>
</body>
</html>
