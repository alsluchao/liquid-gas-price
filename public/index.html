<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="液气价格统计">
    <meta name="theme-color" content="#1890ff">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>液气价格统计系统</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        h2 {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            font-weight: 400;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            color: #555;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 3px rgba(24, 144, 255, 0.1);
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 15px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .hint {
            color: #999;
            font-size: 12px;
            line-height: 1.6;
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .status.success {
            background: #e6f7e6;
            color: #52c41a;
            display: block;
        }
        
        .status.error {
            background: #fff1f0;
            color: #ff4d4f;
            display: block;
        }
        
        .footer {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        
        .features {
            text-align: left;
            margin-top: 25px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 10px;
        }
        
        .features h3 {
            color: #1890ff;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .features ul {
            list-style: none;
            padding: 0;
        }
        
        .features li {
            padding: 8px 0;
            color: #555;
            font-size: 13px;
        }
        
        .features li:before {
            content: "✓ ";
            color: #52c41a;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📊</div>
        <h1>液气价格统计系统</h1>
        <h2>永久可用 · 无需安装APP</h2>
        
        <div class="input-group">
            <label for="serverUrl">服务器地址</label>
            <input 
                type="url" 
                id="serverUrl" 
                placeholder="http://服务器地址:端口"
                value=""
            >
        </div>
        
        <button onclick="connect()">连接服务器</button>
        
        <div id="status" class="status"></div>
        
        <div class="features">
            <h3>🎉 v2.0 永久可用版本</h3>
            <ul>
                <li>支持动态配置服务器地址</li>
                <li>IP变化时无需重新安装</li>
                <li>可添加到手机主屏幕</li>
                <li>体验类似原生APP</li>
            </ul>
        </div>
        
        <div class="hint">
            💡 提示：首次使用请输入服务器地址，点击连接后会自动保存。<br>
            IP变化时重新输入新地址即可，无需重新下载！
        </div>
    </div>
    
    <div class="footer">
        © 2026 液气价格统计系统
    </div>
    
    <script>
        // 页面加载时恢复保存的地址
        window.onload = function() {
            const savedUrl = localStorage.getItem('serverUrl');
            if (savedUrl) {
                document.getElementById('serverUrl').value = savedUrl;
            } else {
                // 默认地址
                document.getElementById('serverUrl').value = 'http://9.128.54.29:5000';
            }
        };
        
        function connect() {
            const url = document.getElementById('serverUrl').value.trim();
            const statusDiv = document.getElementById('status');
            
            if (!url) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '请输入服务器地址';
                return;
            }
            
            // 验证URL格式
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '地址必须以 http:// 或 https:// 开头';
                return;
            }
            
            // 保存到本地存储
            localStorage.setItem('serverUrl', url);
            
            // 显示加载状态
            statusDiv.className = 'status';
            statusDiv.style.background = '#e6f7ff';
            statusDiv.style.color = '#1890ff';
            statusDiv.textContent = '正在连接...';
            
            // 测试连接
            fetch(url + '/', {
                method: 'GET',
                mode: 'cors'
            })
            .then(response => {
                if (response.ok) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '连接成功！正在跳转...';
                    
                    // 保存成功后跳转
                    setTimeout(() => {
                        window.location.href = url;
                    }, 1000);
                } else {
                    throw new Error('服务器响应异常');
                }
            })
            .catch(error => {
                statusDiv.className = 'status error';
                statusDiv.textContent = '连接失败，请检查地址是否正确，或服务器是否运行';
                console.error('连接错误:', error);
            });
        }
    </script>
</body>
</html>
